<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BF TV - Free Movies & Shows</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body { background:#0f1115; color:#fff; }
  header { background:linear-gradient(90deg,#00d4ff,#0099ff); padding:15px; text-align:center; }
  header h1 { color:#fff; font-size:1.6rem; font-weight:800; letter-spacing:1px; }
  .offline-banner { background:#ff4757; padding:10px; text-align:center; display:none; }
  .offline-banner.show { display:block; }
  .hero { padding:25px 20px; text-align:center; }
  .hero h2 { margin-bottom:10px; font-size:1.4rem; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:15px; padding:20px; }
  .card { background:#1c1f26; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.2s; }
  .card img { width:100%; height:180px; object-fit:cover; }
  .card p { padding:10px; font-size:0.9rem; }
  .ads { background:#2f3542; margin:20px; padding:15px; border-radius:12px; text-align:center; border:1px solid #00d4ff; }
  .btn { background:#00d4ff; color:#000; padding:12px 20px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin:10px; }
  footer { text-align:center; padding:20px; font-size:0.8rem; color:#aaa; }
</style>
</head>
<body>
<header>
  <h1>BF TV</h1>
  <span>Powered by Wireless Solutions BF</span>
</header>
<div class="offline-banner" id="offlineBanner">
  ⚠️ Network is down. Enjoy offline movies & games below.
</div>
<div class="hero">
  <h2>Watch Free Movies & Series</h2>
  <p>100% Legal. No data cost. Works even during outages.</p>
  <button class="btn" onclick="trackUpgradeClick()">Upgrade Your Package</button>
</div>
<div class="ads">
  <p><strong>Advertise on BF TV</strong></p>
  <p>Reach 1000+ local clients. Call 079 XXXX</p>
</div>
<div class="grid" id="movieGrid"></div>
<footer>
  <p>Support: 079 XXXX | BF TV v1.0</p>
</footer>
<script type="module">
const movies = [
  { title: "Night of the Living Dead", img: "https://archive.org/services/img/NightoftheLivingDead" },
  { title: "The Great Train Robbery", img: "https://archive.org/services/img/great_train_robbery" }
];
const grid = document.getElementById('movieGrid');
movies.forEach(m => {
  grid.innerHTML += `<div class="card"><img src="${m.img}"><p>${m.title}</p></div>`;
});
window.trackUpgradeClick = () => alert("Redirecting to upgrade page...");
</script>
</body>
</html>
