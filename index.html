<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BF TV Wireless Solutions - Free Streaming</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
  body { background:#0a0a0a; color:#fff; padding-bottom:80px; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:15px 20px; background:linear-gradient(180deg, #0a0a0a 0%, transparent 100%);
    position:sticky; top:0; z-index:20; backdrop-filter:blur(10px);
  }
.logo { display:flex; align-items:center; gap:8px; font-size:1.4rem; font-weight:800; }
.logo svg { width:28px; height:28px; }
.logo.accent { color:#b8ff00; }
.logo.sub { font-size:0.9rem; font-weight:600; color:#888; margin-left:5px; }

.search-bar {
    margin:0 20px 15px;
    display:flex; gap:10px;
  }
.search-bar input {
    flex:1; padding:12px 15px; border-radius:25px; border:none;
    background:#1a1a1a; color:#fff; font-size:0.95rem;
    outline:none; transition:0.2s;
  }
.search-bar input:focus { background:#222; box-shadow:0 0 0 2px #b8ff00; }

.tabs {
    display:flex; gap:20px; padding:0 20px 15px;
    overflow-x:auto; scrollbar-width:none;
  }
.tabs::-webkit-scrollbar { display:none; }
.tabs a {
    color:#888; text-decoration:none; font-weight:600;
    font-size:0.95rem; cursor:pointer; white-space:nowrap;
    padding:8px 0; border-bottom:2px solid transparent;
    transition:0.2s;
  }
.tabs a.active,.tabs a:hover { color:#fff; border-bottom:2px solid #b8ff00; }

.hero {
    position:relative; margin:0 20px 30px;
    border-radius:20px; overflow:hidden; height:400px;
  }
.hero-slide {
    position:absolute; inset:0; opacity:0; transition:opacity 0.8s;
    background-size:cover; background-position:center;
  }
.hero-slide.active { opacity:1; }
.hero-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to top, #0a0a0a 10%, transparent 60%);
    display:flex; flex-direction:column; justify-content:flex-end;
    padding:30px;
  }
.hero-overlay h2 { font-size:2rem; margin-bottom:10px; }
.hero-overlay p { color:#aaa; margin-bottom:20px; max-width:600px; }
.hero-buttons { display:flex; gap:10px; }
.btn-watch {
    background:#b8ff00; color:#000; border:none;
    padding:12px 30px; border-radius:8px; font-weight:800;
    cursor:pointer; transition:0.2s;
  }
.btn-watch:hover { transform:scale(1.05); background:#d4ff4d; }

.section { padding:0 20px 30px; }
.section-header {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:15px;
  }
.section-header h3 { font-size:1.3rem; font-weight:700; }

.grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:15px;
  }
.card {
    background:#1a1a1a; border-radius:12px; overflow:hidden;
    cursor:pointer; transition:0.3s; position:relative;
  }
.card:hover { transform:translateY(-8px); box-shadow:0 10px 30px rgba(184,255,0,0.2); }
.card img { width:100%; height:200px; object-fit:cover; }
.badge {
    position:absolute; top:8px; left:8px;
    background:rgba(0,0,0,0.8); color:#b8ff00;
    padding:4px 8px; font-size:0.7rem; font-weight:700;
    border-radius:4px; backdrop-filter:blur(5px);
  }
.fav-btn {
    position:absolute; top:8px; right:8px;
    background:rgba(0,0,0,0.8); border:none;
    color:#fff; width:32px; height:32px; border-radius:50%;
    cursor:pointer; font-size:1.2rem; transition:0.2s;
    backdrop-filter:blur(5px);
  }
.fav-btn.active { color:#ff4757; }
.progress-bar {
    position:absolute; bottom:0; left:0; right:0;
    height:4px; background:rgba(255,255,255,0.2);
  }
.progress-fill {
    height:100%; background:#b8ff00; width:0%;
    transition:width 0.3s;
  }
.card-info { padding:10px; }
.card-info p {
    font-size:0.9rem; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

.bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:#1a1a1a; display:flex; justify-content:space-around;
    padding:12px 0; border-top:1px solid #2a2a2a; z-index:20;
  }
.nav-item {
    text-align:center; color:#666; font-size:0.75rem;
    cursor:pointer; text-decoration:none; transition:0.2s;
  }
.nav-item.active,.nav-item:hover { color:#b8ff00; }
.nav-item svg { width:24px; height:24px; margin-bottom:3px; }

.player-modal {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.98); z-index:100;
    align-items:center; justify-content:center;
  }
.player-modal.show { display:flex; }
.player-content {
    width:95%; max-width:1000px; background:#000; border-radius:16px;
    overflow:hidden;
  }
.player-content iframe { width:100%; height:60vh; border:none; }
.modal-header {
    padding:15px 20px; display:flex; justify-content:space-between; align-items:center;
    background:#1a1a1a;
  }
.close-btn {
    background:none; border:none; color:#fff; font-size:2rem;
    cursor:pointer; line-height:1;
  }

  @media(max-width:768px){
.hero { height:320px; margin:0 15px 20px; }
.hero-overlay h2 { font-size:1.5rem; }
.grid { grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); }
.card img { height:160px; }
.player-content iframe { height:70vh; }
  }
</style>
</head>

  <div class="logo">
    <svg viewBox="0 0 24 24" fill="#b8ff00"><path d="M13 3L4 14h5l-1 7 9-11h-5l1-7z"/></svg>

<div class="tabs">

  <a onclick="filterCategory('continue', this)">Continue Watching</a>

  <a onclick="filterCategory('favorites', this)">My List</a>
  <a onclick="filterCategory('Games', this)">Games</a>

<div class="hero" id="heroSlider"></div>

<div class="section">

<div class="player-modal" id="playerModal">
  <div class="player-content">

<nav class="bottom-nav">

  { title: "Cosmos - Carl Sagan", img: "https://img.youtube.com/vi/zSgiXGELjbc/hqdefault.jpg", type: "youtube", id: "zSgiXGELjbc", badge:"Science", year:"1980", added:"2025-10-25" },

  { title: "Free Solo Documentary", img: "https://img.youtube.com/vi/urDCzUOxgRs/hqdefault.jpg", type: "youtube", id: "urDCzUOxgRs", badge:"Sport", year:"2018", added:"2025-10-30" },
  { title: "Kurzgesagt: Universe", img: "https://img.youtube.com/vi/17jymdnOwxw/hqdefault.jpg", type: "youtube", id: "17jymdnOwxw", badge:"Science", year:"2021", added:"2025-10-31" }
];

// Games
const games = [
  { title: "2048", img: "https://play2048.co/meta/apple-touch-icon.png", type: "game", id: "2048", badge:"Puzzle", url:"https://play2048.co/", added:"2025-10-01" },
  { title: "Snake", img: "https://cdn-icons-png.flaticon.com/512/6134/6134346.png", type: "game", id: "snake", badge:"Arcade", url:"https://playsnake.org/", added:"2025-10-02" },
  { title: "Tic Tac Toe", img: "https://cdn-icons-png.flaticon.com/512/566/566294.png", type: "game", id: "tictactoe", badge:"Strategy", url:"https://playtictactoe.org/", added:"2025-10-03" },
  { title: "Chess", img: "https://cdn-icons-png.flaticon.com/512/1055/1055647.png", type: "game", id: "chess", badge:"Board", url:"https://www.chess.com/play/online", added:"2025-10-04" },
  { title: "Sudoku", img: "https://cdn-icons-png.flaticon.com/512/2779/2779776.png", type: "game", id: "sudoku", badge:"Puzzle", url:"https://sudoku.com/", added:"2025-10-05" },
  { title: "Minesweeper", img: "https://cdn-icons-png.flaticon.com/512/3097/3097006.png", type: "game", id: "minesweeper", badge:"Classic", url:"https://minesweeperonline.com/", added:"2025-10-06" },
  { title: "Flappy Bird", img: "https://cdn-icons-png.flaticon.com/512/2617/2617812.png", type: "game", id: "flappy", badge:"Arcade", url:"https://flappybird.io/", added:"2025-10-07" },
  { title: "Tetris", img: "https://cdn-icons-png.flaticon.com/512/889/889221.png", type: "game", id: "tetris", badge:"Classic", url:"https://tetr.io/", added:"2025-10-08" }
];

// Storage
let favorites = JSON.parse(localStorage.getItem('bf_favorites') || '[]');
let watchHistory = JSON.parse(localStorage.getItem('bf_history') || '{}');
let currentSlide = 0;

function getContinueWatching() {
  return Object.keys(watchHistory)
  .map(id => {
      const movie = [...movies,...games].find(m => m.id === id);
      if(!movie) return null;
      return {...movie, progress: watchHistory[id]};
    })
  .filter(Boolean)
  .sort((a,b) => b.progress.timestamp - a.progress.timestamp);
}

function initHero() {
  const hero = document.getElementById('heroSlider');
  const featured = movies.slice(0, 3);
  hero.innerHTML = featured.map((m, i) => `
    <div class="hero-slide ${i===0?'active':''}" style="background-image:url('${m.img}')">
      <div class="hero-overlay">
        <h2>${m.title}</h2>
        <p>${m.year} • ${m.badge} • Free</p>
        <div class="hero-buttons">
          <button class="btn-watch" onclick="playVideo('${m.type}','${m.id}','${m.title}')">▶ WATCH NOW</button>
        </div>
      </div>
    </div>
  `).join('');

  setInterval(() => {
    const slides = document.querySelectorAll('.hero-slide');
    if(slides.length === 0) return;
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
  }, 5000);
}

function loadGrid(id, items) {
  const grid = document.getElementById(id);
  if(items.length === 0) {
    grid.innerHTML = '<p style="color:#666; grid-column:1/-1; text-align:center;">Nothing here yet</p>';
    return;
  }
  grid.innerHTML = items.map(item => {
    const progress = watchHistory[item.id];
    const progressPercent = progress? (progress.currentTime / progress.duration) * 100 : 0;

    const clickAction = item.type === 'game'
    ? `playGame('${item.url}','${item.title}')`
      : `playVideo('${item.type}', '${item.id}', '${item.title}', ${progress?.currentTime || 0})`;

    return `
    <div class="card" onclick="${clickAction}">
      <div style="position:relative;">
        <span class="badge">${item.badge}</span>
        <button class="fav-btn ${favorites.includes(item.id)?'active':''}"
                onclick="toggleFavorite('${item.id}', event)">♥</button>
        <img src="${item.img}" alt="${item.title}" loading="lazy">
        ${progressPercent > 0? `<div class="progress-bar"><div class="progress-fill" style="width:${progressPercent}%"></div></div>` : ''}
      </div>
      <div class="card-info">
        <p>${item.title}</p>
      </div>
    </div>
  `}).join('');
}

function playVideo(type, id, title, startTime = 0) {
  const modal = document.getElementById('playerModal');
  const player = document.getElementById('videoPlayer');
  document.getElementById('playerTitle').textContent = title;

  if(type === 'archive') {
    player.src = `https://archive.org/embed/${id}?start=${Math.floor(startTime)}&autoplay=1`;
  } else if(type === 'youtube') {
    player.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&enablejsapi=1&start=${Math.floor(startTime)}`;
  }

  modal.classList.add('show');
}

function playGame(url, title) {
  const modal = document.getElementById('playerModal');
  const player = document.getElementById('videoPlayer');
  document.getElementById('playerTitle').textContent = title;
  player.src = url;
  modal.classList.add('show');
}

function closePlayer() {
  document.getElementById('playerModal').classList.remove('show');
  document.getElementById('videoPlayer').src = '';
}

function filterCategory(cat, el) {
  document.querySelectorAll('.tabs a').forEach(a => a.classList.remove('active'));
  if(el) el.classList.add('active');

  let items = movies;
  let title = "🔥 Popular Movies";

  if(cat === 'continue') {
    items = getContinueWatching();
    title = "⏯️ Continue Watching";
    document.getElementById('gamesSection').style.display = 'none';
  } else if(cat === 'recent') {
    items = getRecent();
    title = "🆕 Recently Added";
    document.getElementById('gamesSection').style.display = 'none';
  } else if(cat === 'favorites') {
    items = getFavorites();
    title = "❤️ My List";
    document.getElementById('gamesSection').style.display = 'none';
  } else if(cat === 'Games') {
    items = games;
    title = "🎮 Games";
  } else if(cat!== 'all') {
    items = movies.filter(m => m.badge === cat);
  }

  document.getElementById('sectionTitle').textContent = title;
  loadGrid('moviesGrid', items);
  window.scrollTo({top:0, behavior:'smooth'});
}

function showHome() {
  filterCategory('all', document.querySelector('.tabs a'));
  document.getElementById('gamesSection').style.display = 'block';
}

function toggleFavorite(id, e) {
  e.stopPropagation();
  if(favorites.includes(id)) {
    favorites = favorites.filter(f => f!== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('bf_favorites', JSON.stringify(favorites));
  renderGrids();
}

function getFavorites() {
  return [...movies,...games].filter(m => favorites.includes(m.id));
}

function getRecent() {
  return [...movies,...games].sort((a,b) => new Date(b.added) - new Date(a.added)).slice(0, 12);
}

function searchContent() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  if(!query) {
    filterCategory('all', null);
    return;
  }
  const filtered = [...movies,...games].filter(m => m.title.toLowerCase().includes(query));
  document.getElementById('sectionTitle').textContent = `🔍 Results for "${query}"`;
  loadGrid('moviesGrid', filtered);
  document.getElementById('gamesSection').style.display = 'none';
}

function renderGrids() {
  loadGrid('moviesGrid', movies);
  loadGrid('gamesGrid', games);
}

// Init
initHero();
renderGrids();

document.getElementById('searchInput').addEventListener('input', searchContent);
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closePlayer();
});
</script>
