<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BF TV - Free Streaming</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
  body { background:#0d0d0d; color:#fff; padding-bottom:70px; }
  
  header { 
    display:flex; align-items:center; justify-content:space-between; 
    padding:15px 20px; background:#0d0d0d; position:sticky; top:0; z-index:10;
  }
  .logo { display:flex; align-items:center; gap:8px; font-size:1.4rem; font-weight:800; }
  .logo svg { width:28px; height:28px; }
  .logo .accent { color:#b8ff00; }
  
  .tabs { display:flex; gap:25px; padding:0 20px 15px; border-bottom:1px solid #1a1a1a; overflow-x:auto; }
  .tabs a { color:#888; text-decoration:none; font-weight:600; font-size:0.95rem; cursor:pointer; white-space:nowrap; }
  .tabs a.active { color:#fff; }
  
  .hero { padding:20px; }
  .hero-card { 
    position:relative; border-radius:16px; overflow:hidden; 
    background:#1a1a1a;
  }
  .hero-card img { width:100%; height:280px; object-fit:cover; }
  .hero-info { padding:15px; text-align:center; }
  .hero-info h2 { font-size:1.5rem; margin-bottom:5px; }
  .hero-info p { color:#aaa; font-size:0.85rem; margin-bottom:15px; }
  .btn-watch { 
    background:#b8ff00; color:#000; border:none; 
    padding:12px 40px; border-radius:8px; font-weight:800; 
    font-size:1rem; cursor:pointer; width:100%;
  }
  
  .section { padding:20px; }
  .section-header { 
    display:flex; justify-content:space-between; align-items:center; 
    margin-bottom:15px;
  }
  .section-header h3 { font-size:1.2rem; }
  
  .grid { 
    display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); 
    gap:12px; 
  }
  .card { 
    background:#1a1a1a; border-radius:10px; overflow:hidden; 
    cursor:pointer; transition:0.2s; position:relative;
  }
  .card:hover { transform:scale(1.05); }
  .card img { width:100%; height:150px; object-fit:cover; }
  .card .badge { 
    position:absolute; background:#000; color:#b8ff00; 
    padding:2px 6px; font-size:0.7rem; font-weight:700; 
    margin:5px; border-radius:4px; z-index:2;
  }
  .card p { 
    padding:8px; font-size:0.8rem; white-space:nowrap; 
    overflow:hidden; text-overflow:ellipsis; 
  }
  
  .bottom-nav { 
    position:fixed; bottom:0; left:0; right:0; 
    background:#1a1a1a; display:flex; justify-content:space-around; 
    padding:10px 0; border-top:1px solid #2a2a2a; z-index:10;
  }
  .nav-item { 
    text-align:center; color:#666; font-size:0.75rem; 
    cursor:pointer; text-decoration:none;
  }
  .nav-item.active { color:#b8ff00; }
  .nav-item svg { width:24px; height:24px; margin-bottom:3px; }
  
  .offline-banner { 
    background:#ff4757; padding:10px; text-align:center; 
    display:none; font-size:0.85rem;
  }
  .offline-banner.show { display:block; }
  
  .player-modal {
    display:none; position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.95); z-index:100; padding:20px;
    align-items:center; justify-content:center;
  }
  .player-modal.show { display:flex; }
  .player-content {
    width:100%; max-width:900px; background:#000; border-radius:12px;
    overflow:hidden;
  }
  .player-content iframe { width:100%; height:500px; border:none; display:block; }
  .player-header {
    padding:15px; display:flex; justify-content:space-between; align-items:center;
    background:#1a1a1a;
  }
  .player-header h3 { font-size:1.1rem; }
  .close-btn {
    background:none; border:none; color:#fff; font-size:1.5rem;
    cursor:pointer; padding:0 10px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="#b8ff00"><path d="M13 3L4 14h5l-1 7 9-11h-5l1-7z"/></svg>
    <span>BF <span class="accent">TV</span></span>
  </div>
</header>

<div class="tabs">
  <a class="active">Home</a>
  <a onclick="scrollToSection('world')">World Docs</a>
  <a onclick="scrollToSection('movies')">Movies</a>
  <a onclick="scrollToSection('cartoons')">Cartoons</a>
  <a onclick="scrollToSection('games')">Games</a>
</div>

<div class="offline-banner" id="offlineBanner">
  ⚠️ Network is down. Playing offline content.
</div>

<div id="homeSection">
  <div class="hero">
    <div class="hero-card">
      <img src="https://archive.org/services/img/kruger_national_park" alt="Kruger National Park">
      <div class="hero-info">
        <h2>Kruger National Park</h2>
        <p>Wildlife Documentary • South Africa</p>
        <button class="btn-watch" onclick="playVideo('kruger_national_park', 'Kruger National Park')">WATCH NOW</button>
      </div>
    </div>
  </div>

  <div class="section" id="world">
    <div class="section-header"><h3>🌍 World Documentaries</h3></div>
    <div class="grid" id="worldGrid"></div>
  </div>

  <div class="section" id="movies">
    <div class="section-header"><h3>Classic Movies</h3></div>
    <div class="grid" id="moviesGrid"></div>
  </div>

  <div class="section" id="cartoons">
    <div class="section-header"><h3>Cartoons & Classics</h3></div>
    <div class="grid" id="cartoonsGrid"></div>
  </div>

  <div class="section" id="games">
    <div class="section-header"><h3>Offline Games</h3></div>
    <div class="grid" id="gamesGrid"></div>
  </div>
</div>

<!-- Video Player Modal -->
<div class="player-modal" id="playerModal">
  <div class="player-content">
    <div class="player-header">
      <h3 id="playerTitle">Now Playing</h3>
      <button class="close-btn" onclick="closePlayer()">×</button>
    </div>
    <iframe id="videoPlayer" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <div>Home</div>
  </a>
  <a class="nav-item" onclick="scrollToSection('world')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm4 0h-2v-6h2v6z"/></svg>
    <div>World</div>
  </a>
  <a class="nav-item" onclick="scrollToSection('movies')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18 4l-8 8-8-8v16h16V4z"/></svg>
    <div>Movies</div>
  </a>
  <a class="nav-item" onclick="scrollToSection('games')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zM3 13h18v-2H3v2zM3 6v2h18V6H3z"/></svg>
    <div>Games</div>
  </a>
</nav>

<script>
const worldContent = [
  { title: "Kruger National Park", img: "https://archive.org/services/img/kruger_national_park", archiveId: "kruger_national_park", badge:"SA" },
  { title: "Grand Canyon", img: "https://archive.org/services/img/grand_canyon_doc", archiveId: "grand_canyon_doc", badge:"USA" },
  { title: "Tokyo 1960s", img: "https://archive.org/services/img/tokyo_1960s", archiveId: "tokyo_1960s", badge:"Japan" },
  { title: "London 1920s", img: "https://archive.org/services/img/london_1920s", archiveId: "london_1920s", badge:"UK" },
  { title: "Amazon Rainforest", img: "https://archive.org/services/img/amazon_rainforest", archiveId: "amazon_rainforest", badge:"Brazil" },
  { title: "Egypt Pyramids", img: "https://archive.org/services/img/egypt_pyramids_doc", archiveId: "egypt_pyramids_doc", badge:"Egypt" },
  { title: "Paris 1930s", img: "https://archive.org/services/img/paris_1930s", archiveId: "paris_1930s", badge:"France" },
  { title: "Great Wall China", img: "https://archive.org/services/img/great_wall_china", archiveId: "great_wall_china", badge:"China" },
  { title: "Sahara Desert", img: "https://archive.org/services/img/sahara_desert_doc", archiveId: "sahara_desert_doc", badge:"Africa" },
  { title: "Venice 1950s", img: "https://archive.org/services/img/venice_1950s", archiveId: "venice_1950s", badge:"Italy" },
  { title: "Australian Outback", img: "https://archive.org/services/img/australian_outback", archiveId: "australian_outback", badge:"Australia" },
  { title: "Alps Mountains", img: "https://archive.org/services/img/alps_mountains_doc", archiveId: "alps_mountains_doc", badge:"Europe" }
];

const movies = [
  { title: "Night of the Living Dead", img: "https://archive.org/services/img/NightoftheLivingDead", archiveId: "NightoftheLivingDead", badge:"Horror" },
  { title: "The Great Train Robbery", img: "https://archive.org/services/img/great_train_robbery", archiveId: "great_train_robbery", badge:"Western" },
  { title: "Metropolis", img: "https://archive.org/services/img/metropolis1927", archiveId: "metropolis1927", badge:"Sci-Fi" },
  { title: "Charade", img: "https://archive.org/services/img/Charade_512", archiveId: "Charade_512", badge:"Thriller" },
  { title: "Nosferatu", img: "https://archive.org/services/img/nosferatu", archiveId: "nosferatu", badge:"Horror" },
  { title: "The General", img: "https://archive.org/services/img/the_general", archiveId: "the_general", badge:"Comedy" }
];

const cartoons = [
  { title: "Steamboat Willie", img: "https://archive.org/services/img/Steamboat_Willie", archiveId: "Steamboat_Willie", badge:"Mickey" },
  { title: "Popeye - I Yam What I Yam", img: "https://archive.org/services/img/popeye_I_Yam_What_I_Yam", archiveId: "popeye_I_Yam_What_I_Yam", badge:"Classic" },
  { title: "Felix the Cat", img: "https://archive.org/services/img/felix-the-cat-public-domain", archiveId: "felix-the-cat-public-domain", badge:"Silent" },
  { title: "Betty Boop", img: "https://archive.org/services/img/Betty_Boop_Snow_White", archiveId: "Betty_Boop_Snow_White", badge:"1930s" },
  { title: "Looney Tunes", img: "https://archive.org/services/img/looney_tunes_public", archiveId: "looney_tunes_public", badge:"Cartoon" },
  { title: "Tom & Jerry", img: "https://archive.org/services/img/tom_jerry_public", archiveId: "tom_jerry_public", badge:"Classic" }
];

const games = [
  { title: "2048", img: "https://play2048.co/meta/apple-touch-icon.png", url:"https://play2048.co/", badge:"Puzzle" },
  { title: "Snake", img: "https://cdn-icons-png.flaticon.com/512/6134/6134346.png", url:"https://playsnake.org/", badge:"Arcade" },
  { title: "Tic Tac Toe", img: "https://cdn-icons-png.flaticon.com/512/566/566294.png", url:"https://playtictactoe.org/", badge:"Strategy" },
  { title: "Chess", img: "https://cdn-icons-png.flaticon.com/512/1055/1055647.png", url:"https://www.chess.com/play/online", badge:"Board" }
];

function loadGrid(id, items, type) {
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  items.forEach(item => {
    const onclick = type === 'game' 
      ? `window.open('${item.url}', '_blank')` 
      : `playVideo('${item.archiveId}', '${item.title}')`;
    
    grid.innerHTML += `
      <div class="card" onclick="${onclick}">
        <div style="position:relative;">
          <span class="badge">${item.badge}</span>
          <img src="${item.img}" alt="${item.title}">
        </div>
        <p>${item.title}</p>
      </div>
    `;
  });
}

function playVideo(archiveId, title) {
  const modal = document.getElementById('playerModal');
  const player = document.getElementById('videoPlayer');
  document.getElementById('playerTitle').textContent = title;
  player.src = `https://archive.org/embed/${archiveId}`;
  modal.classList.add('show');
}

function closePlayer() {
  const modal = document.getElementById('playerModal');
  const player = document.getElementById('videoPlayer');
  player.src = '';
  modal.classList.remove('show');
}

function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// Load content
loadGrid('worldGrid', worldContent, 'video');
loadGrid('moviesGrid', movies, 'video');
loadGrid('cartoonsGrid', cartoons, 'video');
loadGrid('gamesGrid', games, 'game');

// Offline detection
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));
window.addEventListener('online', () => document.getElementById('offlineBanner').classList.remove('show'));

// Close player on ESC
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closePlayer();
});
</script>

</body>
</html>
